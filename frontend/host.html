<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Host</title>
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --bg-body: #f4f4f9;
            --bg-sidebar: #ffffff;
            --bg-card: #ffffff;
            --text-main: #333;
            --text-muted: #666;
            --border-color: #e0e0e0;
            --cat-header-bg: #00008b;
            --cat-header-text: #fff;
            
            /* BUTTONS & ACCENTS */
            --color-primary: #007bff;
            --color-success: #28a745;
            --color-danger: #dc3545;
            --color-warning: #ffc107;
            --color-info: #17a2b8;
            --color-secondary: #6c757d;
            
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --overlay-bg: rgba(0, 0, 0, 0.85);
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-sidebar: #1e1e1e;
            --bg-card: #2c2c2c;
            --text-main: #e0e0e0;
            --text-muted: #aaa;
            --border-color: #444;
            --cat-header-bg: #000055;
            --cat-header-text: #ddd;
            
            --color-primary: #3d8bfd;
            --color-success: #2ea043;
            --color-danger: #f85149;
            
            --shadow: 0 4px 6px rgba(0,0,0,0.5);
            --overlay-bg: rgba(0, 0, 0, 0.95);
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; padding: 0;
            background: var(--bg-body); 
            color: var(--text-main);
            display: flex; 
            height: 100vh; 
            overflow: hidden; /* Scrollen im Body verhindern */
        }
        
        /* --- SIDEBAR (Links) --- */
        #sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--bg-sidebar); 
            border-right: 1px solid var(--border-color);
            display: flex; 
            flex-direction: column; 
            padding: 20px;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar-section { margin-bottom: 20px; }
        .sidebar-section.grow { flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; }
        .sidebar-section.bottom { margin-top: auto; margin-bottom: 0; padding-top: 20px; border-top: 1px solid var(--border-color); }

        h2, h3 { margin-top: 0; font-size: 1.2rem; color: var(--text-main); }
        
        #room-code-box {
            background: var(--color-primary);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
        }
        #room-code-display { font-size: 1.5rem; font-weight: bold; margin: 0; }
        .room-url { font-size: 0.8rem; color: rgba(255,255,255,0.8); display: block; margin-top: 5px; text-decoration: none;}

        /* Spieler Liste */
        #player-list { 
            list-style: none; padding: 0; margin: 0; 
            overflow-y: auto; 
            flex-grow: 1;
            padding-right: 5px; /* Platz für Scrollbar */
        }
        .player-item { 
            padding: 10px; 
            background: var(--bg-body);
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center; 
        }
        .player-item .score { font-weight: bold; font-size: 1.1rem; }

        /* Musik Controls Compact */
        #music-controls {
            background: var(--bg-body);
            border-radius: 8px;
            padding: 10px;
            display: flex; flex-direction: column; gap: 8px;
        }
        .music-row { display: flex; justify-content: space-between; align-items: center; }

        /* --- MAIN CONTENT (Rechts) --- */
        #main-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: auto; /* Grid soll scrollen können wenn nötig */
            position: relative;
        }

        #host-grid { 
            display: flex; 
            gap: 15px; 
            /* Grid zentrieren wenn Platz da ist */
            margin: 0 auto;
            max-width: 100%;
        }
        
        .host-col { 
            flex: 1; 
            min-width: 140px; 
            display: flex; flex-direction: column; gap: 8px; 
        }
        
        .host-cat-title { 
            font-weight: bold; 
            text-align: center; 
            background: var(--cat-header-bg); 
            color: var(--cat-header-text); 
            padding: 10px; 
            border-radius: 4px; 
            box-shadow: 0 2px 4px var(--shadow);
            min-height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center;

            word-break: break-word;      
            overflow-wrap: break-word;   
            
            -webkit-hyphens: auto;       
            -moz-hyphens: auto;          
            -ms-hyphens: auto;           
            hyphens: auto;              

            text-transform: uppercase;   
            line-height: 1.2;           
            font-size: 0.9rem;           
        }
        
        .q-btn {
            padding: 15px; 
            background: var(--bg-card);
            color: var(--color-primary); 
            border: 2px solid var(--color-primary);
            font-size: 1.5rem; font-weight: bold; 
            cursor: pointer; border-radius: 4px;
            transition: all 0.2s;
            box-shadow: 0 2px 4px var(--shadow);
        }
        .q-btn:hover:not(.used) { background: var(--color-primary); color: white; transform: translateY(-2px); }
        .q-btn.used { 
            background: transparent; color: var(--text-muted); border-color: var(--border-color); 
            text-decoration: line-through; opacity: 0.5; cursor: default; box-shadow: none;
        }

        /* --- OVERLAY FÜR AKTIVE FRAGE (Modal) --- */
        #active-question-section { 
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--overlay-bg);
          /*  backdrop-filter: blur(5px); Glas-Effekt */
            z-index: 1000;
            display: none; /* Standardmäßig aus */
            justify-content: center;
                        align-items: center;
                        padding: 12px;
                        overflow: hidden;
        }

        .question-modal-content {
            background: var(--bg-card);
            width: 96%; max-width: 1100px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.3s ease-out;
            max-height: calc(100vh - 24px);
            margin: 0 auto;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        .modal-header {
            background: var(--bg-body);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: flex-start;
            gap: 12px;
        }
        .modal-header h4 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-muted);
            flex: 1 1 auto;
            line-height: 1.3;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .modal-points { font-weight: bold; color: var(--color-primary); font-size: 1.2rem; }

        .modal-body {
            padding: 20px;
            overflow: hidden;
            flex-grow: 1;
        }

        .modal-footer {
            padding: 15px 20px;
            background: var(--bg-body);
            border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
            max-height: 36vh;
            overflow: hidden;
            align-content: flex-start;
        }

        #active-question-section.elemination-active .question-modal-content {
            max-height: calc(100vh - 16px);
        }

        #active-question-section.elemination-active .modal-header {
            padding: 10px 16px;
        }

        #active-question-section.elemination-active .modal-body {
            padding: 10px 14px;
        }

        /* --- BUTTONS --- */
        .host-btn {
            border: none; color: white; padding: 10px 18px; 
            border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
            transition: opacity 0.2s;
            display: inline-flex; align-items: center; justify-content: center; gap: 5px;
        }
        .host-btn:hover { opacity: 0.9; }
        .btn-full { width: 100%; margin-top: 5px; }

        .btn-primary { background: var(--color-primary); }
        .btn-success { background: var(--color-success); }
        .btn-danger { background: var(--color-danger); }
        .btn-warning { background: var(--color-warning); color: #000; }
        .btn-info { background: var(--color-info); }
        .btn-secondary { background: var(--color-secondary); }

        /* Toggle Button */
        .icon-btn {
            background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-main);
            padding: 5px; border-radius: 4px;
        }
        .icon-btn:hover { background: var(--border-color); }

        /* Media Queries */
        @media (max-width: 900px) {
            #sidebar { width: 250px; min-width: 250px; }
            .q-btn { font-size: 1.2rem; padding: 10px; }
        }
        #btn-intro-next {
            white-space: normal !important;   /* Erlaubt Zeilenumbruch */
            height: auto !important;          /* Höhe darf wachsen */
            min-height: 44px;                 /* Mindesthöhe für gute Klickbarkeit */
            line-height: 1.3;                 /* Schönerer Zeilenabstand bei 2 Zeilen */
            text-align: center;               
            
            /* WICHTIG für dein Screenshot-Problem (lange Wörter ohne Leerzeichen): */
            word-break: break-word;           
            overflow-wrap: break-word;
            
            padding: 10px;                    /* Innenabstand sicherstellen */
        }

        .grading-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px;
            margin-bottom: 8px;
            background: var(--bg-card); /* Passt sich an Dark/Light an */
            color: var(--text-main);    /* Passt sich an Dark/Light an */
            border: 1px solid var(--border-color);
            border-radius: 6px;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .grading-row.correct {
            /* Zartes Grün mit Transparenz - funktioniert auf Weiß und Schwarz */
            background-color: rgba(40, 167, 69, 0.15) !important; 
            border-color: #28a745 !important;
        }

        .grading-row.incorrect {
            /* Zartes Rot mit Transparenz */
            background-color: rgba(220, 53, 69, 0.15) !important; 
            border-color: #dc3545 !important;
        }

        /* Antwort-Text fetter und größer machen für Lesbarkeit */
        .grading-text {
            font-size: 1.1rem; 
            font-weight: 500;
            margin-top: 4px;
            color: var(--text-main);

            white-space: pre-wrap;       /* Behält Zeilenumbrüche bei, bricht aber auch um */
            word-wrap: break-word;       /* Ältere Browser */
            overflow-wrap: break-word;   /* Standard */
            word-break: break-word;      /* Erzwingt Umbruch auch mitten im Wort wenn nötig */
        }
        
        /* Namen etwas dezenter */
        .grading-name {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
        }
    
        /* Extracted inline styles */
        .inline-font-size-0-8rem-text-transform-uppercase { font-size: 0.8rem; text-transform: uppercase; opacity: 0.8; }
        .inline-margin-bottom-10px-border-2px-solid-white { margin-bottom: 10px; border: 2px solid white; }
        .inline-display-flex-justify-content-space-between { display:flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .inline-display-none { display:none; }
        .inline-font-weight-bold-font-size-0-9rem { font-weight:bold; font-size:0.9rem; }
        .inline-font-size-0-8rem { font-size:0.8rem; }
        .inline-width-100px { width: 100px; }
        .inline-display-flex-justify-content-space-between-2 { display:flex; justify-content: space-between; margin-top: 15px; }
        .inline-font-size-0-8rem-padding-5px-10px { font-size: 0.8rem; padding: 5px 10px; }
        .inline-font-size-1-5rem { font-size:1.5rem; }
        .inline-font-size-1-2rem-margin-bottom-20px { font-size: 1.2rem; margin-bottom: 20px; }
        .inline-border-0-border-top-1px-dashed-border-co { border:0; border-top:1px dashed var(--border-color); margin: 15px 0; }
        .inline-font-size-1-1rem-color-text-muted { font-size: 1.1rem; color: var(--text-muted); }
        .inline-display-none-margin-top-20px { display:none; margin-top:20px; border-top:1px solid #eee; padding-top:15px; }
        .inline-margin-0-0-10px-0 { margin:0 0 10px 0; }
        .inline-display-flex-flex-direction-column { display:flex; flex-direction:column; gap:10px; }
        .inline-width-100-display-none { width: 100%; display:none; background: rgba(255, 193, 7, 0.1); padding: 10px; border-radius: 5px; margin-bottom: 10px; border: 1px solid var(--color-warning); }
        .inline-text-align-center-font-weight-bold { text-align: center; font-weight: bold; font-size: 1.2rem; margin-bottom: 5px; }
        .inline-color-color-primary-font-size-1-4rem { color: var(--color-primary); font-size: 1.4rem; }
        .inline-display-flex-gap-10px { display: flex; gap: 10px; justify-content: center; }
        .inline-display-none-margin-left-10px { display:none; margin-left: 10px; }
        .inline-display-none-align-items-center { display:none; align-items: center; gap: 15px; }
        .inline-font-weight-bold { font-weight:bold; }
        .inline-display-none-margin-top-15px { display:none; margin-top:15px; background:#fffbe6; padding:10px; border:1px solid #ffd700; border-radius:5px; color:#333; }
        .inline-font-weight-bold-margin-bottom-5px { font-weight:bold; margin-bottom:5px; }
        .inline-font-size-0-9rem-color-555 { font-size:0.9rem; color:#555; margin-bottom:10px; font-style:italic; }
        .inline-margin-left-auto { margin-left: auto; }
        .inline-display-none-align-items-center-2 { display:none; align-items:center; gap:10px; background: #e6f7ff; padding: 10px; border-radius: 5px; border: 1px solid #1890ff; }
        .inline-font-weight-bold-color-007bff { font-weight:bold; color:#007bff; }
        .inline-padding-5px-10px { padding: 5px 10px; }
        .inline-display-none-align-items-center-3 { display:none; align-items: center; gap: 15px; background: #e3f2fd; padding: 10px; border-radius: 5px; border: 1px solid #90caf9; }
        .inline-font-weight-bold-color-0d47a1 { font-weight:bold; color: #0d47a1; }
        .inline-display-none-align-items-center-4 { display:none; align-items: center; gap: 15px; background: #e8f5e9; padding: 10px; border-radius: 5px; border: 1px solid #a5d6a7; }
        .inline-font-weight-bold-color-2e7d32 { font-weight:bold; color: #2e7d32; }
        .inline-display-none-margin-top-15px-elemination { display:none; margin-top:15px; background:#f0f8ff; padding:10px; border:1px solid #8ec5ff; border-radius:5px; color:#222; }

        #elemination-mode-controls {
            flex: 1 1 100%;
            max-height: none;
            overflow: visible;
            background: #f0f8ff;
            border: 1px solid #8ec5ff;
            border-radius: 10px;
            padding: 10px;
            margin-top: 8px;
        }

        .elemination-header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }

        #btn-reveal-all-elemination {
            margin-left: auto;
            padding: 6px 12px;
            font-size: 0.82rem;
            white-space: nowrap;
        }

        #elemination-status {
            position: sticky;
            top: 0;
            z-index: 1;
            background: #f0f8ff;
            padding: 4px 0 8px;
            margin-bottom: 8px;
        }

        #elemination-answer-buttons {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
            max-height: none;
            overflow: visible;
            padding-right: 0;
        }

        #elemination-answer-buttons .host-btn {
            width: 100%;
            min-height: 54px;
            border: 3px solid rgba(255,255,255,0.85);
            border-radius: 12px;
            background: #00008b;
            color: #ffe100;
            font-size: 0.98rem;
            font-weight: 800;
            padding: 8px;
            line-height: 1.15;
            box-shadow: 0 2px 6px rgba(0,0,0,0.18);
            white-space: normal;
            text-align: center;
            word-break: break-word;
            overflow-wrap: break-word;
            transition: transform 0.15s ease, opacity 0.15s ease;
        }

        #elemination-answer-buttons .host-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            opacity: 0.95;
        }

        #elemination-answer-buttons .host-btn.revealed {
            background: #0d7a2f;
            color: #ffffff;
            border-color: #c8ffd8;
            cursor: default;
            opacity: 0.98;
        }

        #elemination-mode-controls.compact #elemination-answer-buttons .host-btn {
            padding: 6px 10px;
            font-size: 0.8rem;
            line-height: 1.2;
            min-height: 48px;
        }

        @media (max-width: 900px) {
            #elemination-answer-buttons {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 560px) {
            #elemination-answer-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="sidebar-section">
            <div id="room-code-box">
                <div class="inline-font-size-0-8rem-text-transform-uppercase">Raum Code</div>
                <p id="room-code-display">----</p>
                <a id="board-url" href="#" target="_blank" class="room-url">Board öffnen ↗</a>
            </div>
            <button id="toggle-qr-btn" class="host-btn btn-info btn-full">QR-Code zeigen</button>
            <button id="btn-intro-next" class="host-btn btn-warning btn-full inline-margin-bottom-10px-border-2px-solid-white">
                Start: Titel zeigen
            </button>
        </div>

        <div class="sidebar-section grow">
            <div class="inline-display-flex-justify-content-space-between">
                <h3>Spieler (<span id="player-count">0</span>)</h3>
            </div>
            <ul id="player-list">
                </ul>
        </div>

        <div class="sidebar-section bottom">
            <div id="music-controls" class="inline-display-none">
                <div class="music-row">
                    <span class="inline-font-weight-bold-font-size-0-9rem">Hintergrundmusik</span>
                    <button id="btn-music-toggle" class="icon-btn" title="Play/Pause">▶</button>
                </div>
                <div class="music-row">
                    <span class="inline-font-size-0-8rem">Vol:</span>
                    <input type="range" id="music-volume" min="0" max="1" step="0.1" value="0.3" class="inline-width-100px">
                </div>
            </div>

            <button id="btn-podium" class="host-btn btn-success btn-full inline-margin-bottom-10px-border-2px-solid-white">
                Siegerehrung starten
            </button>

            <div class="inline-display-flex-justify-content-space-between-2">
                <button id="theme-toggle-btn" class="icon-btn" title="Darkmode">🌓</button>
                <button id="exit-quiz-btn" class="host-btn btn-danger inline-font-size-0-8rem-padding-5px-10px">Beenden</button>
            </div>
        </div>
    </div>

    <div id="main-area">
        <div id="host-grid">
            </div>
    </div>

    <div id="active-question-section">
        <div class="question-modal-content">
            <div class="modal-header">
                <h4 id="question-title">Kategorie - Punkte</h4>
                <button id="btn-close-modal-top" class="icon-btn inline-font-size-1-5rem">&times;</button>
            </div>

            <div class="modal-body">
                <div id="question-display" class="inline-font-size-1-2rem-margin-bottom-20px"></div>
                <hr id="answer-separator" class="inline-border-0-border-top-1px-dashed-border-co">
                <div id="answer-display" class="inline-font-size-1-1rem-color-text-muted"></div>

                <div id="buzz-winner-section" class="inline-width-100-display-none">
                    <div class="inline-text-align-center-font-weight-bold">
                        Dran: <span id="buzz-winner-name" class="inline-color-color-primary-font-size-1-4rem">Name</span>
                    </div>
                    <div class="inline-display-flex-gap-10px">
                        <button id="correct-btn" class="host-btn btn-success">Richtig</button>
                        <button id="incorrect-btn" class="host-btn btn-danger">Falsch</button>
                    </div>
                </div>

                <div id="elemination-mode-controls" class="inline-display-none-margin-top-15px-elemination">
                    <div class="elemination-header-row">
                        <div class="inline-font-weight-bold-margin-bottom-5px">Elemination: passende Antwort aufdecken</div>
                        <button id="btn-reveal-all-elemination" class="host-btn btn-secondary">Alle aufdecken</button>
                    </div>
                    <div id="elemination-status" class="inline-font-size-0-9rem-color-555"></div>
                    <div id="elemination-answer-buttons" class="inline-display-flex-flex-direction-column"></div>
                </div>
                
                <div id="freetext-grading-view" class="inline-display-none-margin-top-20px">
                    <h5 class="inline-margin-0-0-10px-0">Antworten bewerten:</h5>
                    <div id="freetext-list" class="inline-display-flex-flex-direction-column"></div>
                </div>
            </div>

            <div class="modal-footer">
                <button id="unlock-buzzers-btn" class="host-btn btn-warning inline-display-none">Nicht verwendet</button>

                <button id="resolve-question-btn" class="host-btn btn-info btn-xl inline-display-none-margin-left-10px">Auflösen</button>

                <div id="map-mode-controls" class="inline-display-none-align-items-center">
                    <span class="inline-font-weight-bold">Map: <span id="map-submitted-count">0/0</span> abgegeben</span>
                    <button id="resolve-map-btn" class="host-btn btn-primary">Auflösen</button>
                </div>

                <div id="list-mode-controls" class="inline-display-none-margin-top-15px">
                    <div class="inline-font-weight-bold-margin-bottom-5px">Liste: Hinweise aufdecken</div>
                    <div id="list-items-preview" class="inline-font-size-0-9rem-color-555">
                        </div>
                    <button id="btn-reveal-list" class="host-btn btn-info">Nächsten Hinweis zeigen</button>
                </div>

                <div id="pixel-mode-controls" class="inline-display-none-align-items-center-2">
                    <span class="inline-font-weight-bold-color-007bff">Pixel:</span>
                    <button id="btn-pixel-pause" class="host-btn btn-warning inline-padding-5px-10px">Pause</button>
                    <button id="btn-pixel-resume" class="host-btn btn-success inline-padding-5px-10px">Weiter</button>
                </div>

                <div id="estimate-mode-controls" class="inline-display-none-align-items-center-3">
