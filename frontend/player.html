<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Jeopardy Player</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* --- THEME VARIABLES --- */
        :root {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #e0e0e0;
            --text-muted: #aaa;
            --border-color: #444;
            
            --btn-buzz-locked: #dc3545;
            --btn-buzz-active: #28a745;
            --btn-buzz-wait: #ffc107;
            
            --btn-primary: #007bff;
            --btn-confirm: #28a745;
            
            --shadow: rgba(0,0,0,0.5);
        }

        /* --- BASE STYLES --- */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            background: var(--bg-body); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            transition: background-color 0.3s;
        }

        /* --- SECTIONS --- */
        #join-section, 
        #game-section { 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100%; 
            width: 100%; 
            box-sizing: border-box;
        }
        
        #game-section { 
            display: none; 
        }

        /* --- INPUTS --- */
        .input-field {
            padding: 15px;
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
            max-width: 300px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            box-sizing: border-box;
        }
        .input-field:focus {
            outline: none;
            border-color: var(--btn-primary);
        }

        /* --- BUTTONS --- */
        .action-btn {
            padding: 15px; 
            font-size: 1.2rem; 
            background: var(--btn-primary); 
            color: white; 
            border: none; 
            border-radius: 8px;
            width: 100%;
            max-width: 300px;
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
        }
        .action-btn:active { transform: translateY(2px); }

        /* --- BUZZER --- */
        #buzzer-button {
            width: min(70vw, 300px); 
            height: min(70vw, 300px); 
            border-radius: 50%; 
            background-color: var(--btn-buzz-locked); 
            color: white;
            font-size: 2rem; 
            font-weight: bold;
            border: 8px solid rgba(0,0,0,0.2); 
            cursor: pointer; 
            transition: transform 0.1s ease, background-color 0.2s;
            box-shadow: 0 10px 20px var(--shadow); 
            -webkit-tap-highlight-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-user-select: none; /* Safari / Chrome Webkit */
            -moz-user-select: none;    /* Firefox */
            -ms-user-select: none;     /* IE 10+ */
            user-select: none;         /* Standard */
        }
        #buzzer-button:active { 
            transform: scale(0.95); 
            box-shadow: 0 5px 10px var(--shadow); 
        }

        #status-message { 
            margin-top: 30px; 
            font-size: 1.5rem; 
            color: var(--text-main);
            font-weight: bold;
            min-height: 2em;
        }

        #player-info { 
            position: absolute; 
            top: 15px; left: 15px; 
            font-size: 0.9rem; 
            color: var(--text-muted); 
            z-index: 10;
        }

        /* --- MAP INTERFACE --- */
        #map-interface { 
            display: none; 
            flex-direction: column; 
            height: 100vh; 
            height: 100dvh; 
            width: 100vw; 
            background: var(--bg-body);
            position: relative;
        }
        
        #map-header { 
            padding: 15px; 
            background: var(--bg-card); 
            font-size: 1.1rem; 
            min-height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-bottom: 1px solid var(--border-color);
        }
        
        #player-map { 
            flex-grow: 1; 
            width: 100%; 
            background: #ccc; 
            z-index: 1;
        }
        
        #confirm-guess-btn { 
            display: none; 
            
            /* Button über der Karte schweben lassen */
            position: absolute; 
            bottom: 30px; /* Abstand vom unteren Rand */
            left: 50%;
            transform: translateX(-50%); /* Horizontal zentrieren */
            z-index: 1000; /* Damit er ÜBER der Karte liegt (Leaflet hat z-index ~400) */
            
            /* Styling für bessere Sichtbarkeit */
            width: 80%; 
            max-width: 300px; 
            padding: 15px 20px; 
            font-size: 1.3rem; 
            background: var(--btn-confirm); 
            color: white; 
            border: none; 
            border-radius: 50px; /* Runde Ecken ("Pill Shape") */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); /* Schatten für Kontrast zur Karte */
            
            text-transform: uppercase; 
            font-weight: bold; 
            cursor: pointer; 
            /* Safe Area für iPhones mit Home-Bar beachten */
            margin-bottom: env(safe-area-inset-bottom);
        }
        
        /* Rejoin Message */
        #rejoin-msg {
            margin-top: 15px;
            color: var(--btn-buzz-wait);
            font-size: 0.9rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    
        /* Extracted inline styles */
        .inline-margin-bottom-30px { margin-bottom: 30px; }
        .inline-display-none { display:none; }
        .inline-display-none-flex-direction-column { display: none; flex-direction: column; height: 100vh; width: 100vw; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .inline-margin-bottom-20px { margin-bottom: 20px; }
        .inline-font-size-2rem-padding-20px { font-size: 2rem; padding: 20px; }
        .inline-background-btn-confirm-margin-top-20px { background: var(--btn-confirm); margin-top: 20px; }
        .inline-display-none-color-btn-buzz-wait { display:none; color: var(--btn-buzz-wait); font-size: 1.2rem; margin-top: 20px; }
        .inline-height-auto-font-family-sans-serif { height: auto; font-family: sans-serif; resize: none; }
    </style>
</head>
<body>

    <div id="player-info">Nicht verbunden</div>

    <div id="join-section">
        <h1 class="inline-margin-bottom-30px">Quiz Beitreten</h1>
        <input type="text" id="room-code" placeholder="Raum Code (z.B. 1234)" class="input-field" pattern="[0-9]*" inputmode="numeric">
        <input type="text" id="player-name" placeholder="Dein Name" class="input-field" maxlength="15">
        
        <button id="join-btn" class="action-btn">Beitreten</button>
        
        <p id="rejoin-msg" class="inline-display-none">Alte Sitzung gefunden...</p>
    </div>

    <div id="game-section">
        <button id="buzzer-button">GESPERRT</button>
        <div id="status-message">Warte auf Host...</div>
    </div>

    <div id="map-interface">
        <div id="map-header">
            <span id="map-q-text">Frage wird geladen...</span>
        </div>
        <div id="player-map"></div>
        <button id="confirm-guess-btn">TIPP ABSENDEN</button>
    </div>

    <div id="estimate-interface" class="inline-display-none-flex-direction-column">
        <h2 id="estimate-q-text" class="inline-margin-bottom-20px">Schätzfrage...</h2>
        
        <input type="number" id="estimate-input" class="input-field inline-font-size-2rem-padding-20px" placeholder="Deine Zahl" step="any">
        
        <button id="submit-estimate-btn" class="action-btn inline-background-btn-confirm-margin-top-20px">ABSCHICKEN</button>
        
        <p id="estimate-wait-msg" class="inline-display-none-color-btn-buzz-wait">
            Gesendet! Warte auf Auflösung...
        </p>
    </div>

    <div id="freetext-interface" class="inline-display-none-flex-direction-column">
        <h2 id="freetext-q-text" class="inline-margin-bottom-20px">Frage...</h2>
        
        <textarea id="freetext-input" class="input-field inline-height-auto-font-family-sans-serif" placeholder="Deine Antwort..." rows="4"></textarea>
        
        <button id="submit-freetext-btn" class="action-btn inline-background-btn-confirm-margin-top-20px">ABSCHICKEN</button>
        
        <p id="freetext-wait-msg" class="inline-display-none-color-btn-buzz-wait">
            Gesendet! Warte auf Auflösung...
        </p>
    </div>

    <script type="module" src="./src/player.ts"></script>
</body>
</html>
